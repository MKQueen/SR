<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>纯视觉 SR - 姿态感知</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
</head>
<style>
    body {
        margin: 0;
        background: black;
        overflow: hidden;
    }
    #video {
        display: none;
    }
    #debug-canvas {
        position: absolute;
        bottom: 10px;
        right: 10px;
        width: 160px;
        height: 120px;
        border: 1px solid #444;
        opacity: 0.7;
    }
    #info {
        position: absolute;
        top: 10px;
        left: 10px;
        color: #0f0;
        font-family: monospace;
        font-size: 12px;
        z-index: 100;
    }
</style>

<body>
<video id="video" playsinline autoplay muted></video>
<canvas id="debug-canvas"></canvas>
<div id="info">纯视觉 SR Demo<br>检测中...</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>
<script>

    // =============================
    // Global Variables
    // =============================
    const video = document.getElementById("video");
    const debugCanvas = document.getElementById("debug-canvas");
    const debugCtx = debugCanvas.getContext("2d");
    debugCanvas.width = 320;
    debugCanvas.height = 240;

    let poseLandmarks = null;
    let isPoseDetected = false;

    // =============================
    // MediaPipe Pose Setup
    // =============================
    const pose = new Pose({
        locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
        }
    });

    pose.setOptions({
        modelComplexity: 1,
        smoothLandmarks: true,
        enableSegmentation: false,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    pose.onResults((results) => {
        debugCtx.save();
        debugCtx.clearRect(0, 0, debugCanvas.width, debugCanvas.height);
        debugCtx.drawImage(results.image, 0, 0, debugCanvas.width, debugCanvas.height);

        if (results.poseLandmarks) {
            poseLandmarks = results.poseLandmarks;
            isPoseDetected = true;
            drawConnectors(debugCtx, results.poseLandmarks, POSE_CONNECTIONS,
                {color: '#00FF00', lineWidth: 2});
            drawLandmarks(debugCtx, results.poseLandmarks,
                {color: '#FF0000', lineWidth: 1, radius: 2});
            document.getElementById("info").innerHTML = "纯视觉 SR Demo<br>✓ 检测到人体";
        } else {
            isPoseDetected = false;
            document.getElementById("info").innerHTML = "纯视觉 SR Demo<br>○ 未检测到人体";
        }
        debugCtx.restore();
    });

    // =============================
    // Camera
    // =============================
    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: "environment",
                    width: 640,
                    height: 480
                },
                audio: false
            });

            video.srcObject = stream;
            await video.play();
            console.log("Camera started successfully");

            // Start pose detection loop
            detectPose();
        } catch (err) {
            console.error("Camera error:", err);
            alert("无法启动摄像头: " + err.message);
        }
    }

    async function detectPose() {
        if (video.readyState >= 2) {
            await pose.send({image: video});
        }
        requestAnimationFrame(detectPose);
    }

    startCamera();


    // =============================
    // Three.js
    // =============================

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    // 3D 透视相机
    const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
    );
    camera.position.set(0, 0, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({
        antialias: true
    });
    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );
    renderer.shadowMap.enabled = true;

    document.body.appendChild(renderer.domElement);


    // =============================
    // Video Texture
    // =============================

    const texture = new THREE.VideoTexture(video);

    texture.minFilter = THREE.LinearFilter;
    texture.magFilter = THREE.LinearFilter;
    texture.colorSpace = THREE.SRGBColorSpace;


    // =============================
    // SR Shader
    // =============================

    const material = new THREE.ShaderMaterial({

        uniforms: {
            tex: { value: texture }
        },

        vertexShader: `

    varying vec2 vUv;

    void main() {

      vUv = uv;

      gl_Position =
        vec4(position, 1.0);

    }

  `,

        fragmentShader: `

    uniform sampler2D tex;
    varying vec2 vUv;

    void main() {
      vec2 px = vec2(1.0/640.0, 1.0/480.0);

      vec3 c = texture2D(tex, vUv).rgb;

      // 8邻域采样做更精细的锐化
      vec3 blur =
        texture2D(tex, vUv + vec2(px.x, 0)).rgb * 0.125 +
        texture2D(tex, vUv - vec2(px.x, 0)).rgb * 0.125 +
        texture2D(tex, vUv + vec2(0, px.y)).rgb * 0.125 +
        texture2D(tex, vUv - vec2(0, px.y)).rgb * 0.125 +
        texture2D(tex, vUv + vec2(px.x, px.y)).rgb * 0.0625 +
        texture2D(tex, vUv - vec2(px.x, px.y)).rgb * 0.0625 +
        texture2D(tex, vUv + vec2(px.x, -px.y)).rgb * 0.0625 +
        texture2D(tex, vUv - vec2(px.x, -px.y)).rgb * 0.0625;

      // 自适应锐化：边缘增强更激进
      float edge = length(c - blur);
      float sharpenStrength = 1.5 + edge * 2.0;

      vec3 sr = c * sharpenStrength - blur * (sharpenStrength - 1.0);

      // 对比度增强
      sr = (sr - 0.5) * 1.2 + 0.5;

      // 饱和度微调
      float luminance = dot(sr, vec3(0.299, 0.587, 0.114));
      sr = mix(vec3(luminance), sr, 1.1);

      gl_FragColor = vec4(clamp(sr, 0.0, 1.0), 1.0);
    }

  `

    });


    // 灯光
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambientLight);

    // =============================
    // Point Cloud from Video
    // =============================
    const pointCloudConfig = {
        width: 120,     // 降采样宽度
        height: 90,     // 降采样高度
        pointSize: 0.15,
        depthScale: 4,  // 亮度转深度系数
        spacing: 0.08   // 点间距
    };

    // 创建视频处理用的 canvas
    const videoCanvas = document.createElement('canvas');
    videoCanvas.width = pointCloudConfig.width;
    videoCanvas.height = pointCloudConfig.height;
    const videoCtx = videoCanvas.getContext('2d', { willReadFrequently: true });

    // 创建点云几何体
    const pointCount = pointCloudConfig.width * pointCloudConfig.height;
    const pointGeometry = new THREE.BufferGeometry();
    const positions = new Float32Array(pointCount * 3);
    const colors = new Float32Array(pointCount * 3);

    pointGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    pointGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const pointMaterial = new THREE.PointsMaterial({
        size: pointCloudConfig.pointSize,
        vertexColors: true,
        sizeAttenuation: true,
        transparent: true,
        opacity: 0.9
    });

    const pointCloud = new THREE.Points(pointGeometry, pointMaterial);
    pointCloud.position.set(0, 0, 0);
    pointCloud.rotation.x = 0;
    scene.add(pointCloud);

    function updatePointCloud() {
        if (video.readyState < 2) return;

        // 绘制视频到 canvas（降采样）
        videoCtx.drawImage(video, 0, 0, pointCloudConfig.width, pointCloudConfig.height);
        const imageData = videoCtx.getImageData(0, 0, pointCloudConfig.width, pointCloudConfig.height);
        const data = imageData.data;

        const positions = pointCloud.geometry.attributes.position.array;
        const colors = pointCloud.geometry.attributes.color.array;

        let i = 0;
        for (let y = 0; y < pointCloudConfig.height; y++) {
            for (let x = 0; x < pointCloudConfig.width; x++) {
                const pixelIndex = (y * pointCloudConfig.width + x) * 4;
                const r = data[pixelIndex];
                const g = data[pixelIndex + 1];
                const b = data[pixelIndex + 2];

                // 计算亮度作为深度
                const brightness = (r + g + b) / 3;
                const depth = (brightness / 255) * pointCloudConfig.depthScale;

                // 设置位置
                positions[i * 3] = (x - pointCloudConfig.width / 2) * pointCloudConfig.spacing;
                positions[i * 3 + 1] = (pointCloudConfig.height / 2 - y) * pointCloudConfig.spacing;
                positions[i * 3 + 2] = depth;

                // 设置颜色（原始视频颜色）
                colors[i * 3] = r / 255;
                colors[i * 3 + 1] = g / 255;
                colors[i * 3 + 2] = b / 255;

                i++;
            }
        }

        pointCloud.geometry.attributes.position.needsUpdate = true;
        pointCloud.geometry.attributes.color.needsUpdate = true;
    }


    // =============================
    // Render Loop
    // =============================

    function animate() {
        requestAnimationFrame(animate);

        if (video.readyState >= 2) {
            texture.needsUpdate = true;
        }

        // 更新点云
        updatePointCloud();

        updateCamera();
        renderer.render(scene, camera);
    }

    // =============================
    // Camera Control
    // =============================

    let isDragging = false;
    let previousMousePosition = { x: 0, y: 0 };
    let cameraAngle = { x: 0, y: 0 };
    const cameraDistance = 12;

    animate();

    document.addEventListener('mousedown', (e) => {
        isDragging = true;
        previousMousePosition = { x: e.clientX, y: e.clientY };
    });

    document.addEventListener('mouseup', () => {
        isDragging = false;
    });

    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;

        const deltaX = e.clientX - previousMousePosition.x;
        const deltaY = e.clientY - previousMousePosition.y;

        cameraAngle.x -= deltaX * 0.01;
        cameraAngle.y = Math.max(0.1, Math.min(Math.PI / 2 - 0.1, cameraAngle.y - deltaY * 0.01));

        previousMousePosition = { x: e.clientX, y: e.clientY };
    });

    function updateCamera() {
        camera.position.x = Math.sin(cameraAngle.x) * Math.cos(cameraAngle.y) * cameraDistance;
        camera.position.y = Math.sin(cameraAngle.y) * cameraDistance;
        camera.position.z = Math.cos(cameraAngle.x) * Math.cos(cameraAngle.y) * cameraDistance;
        camera.lookAt(0, 0, 0);
    }

    // =============================
    // Resize
    // =============================

    window.addEventListener(
        "resize",
        () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(
                window.innerWidth,
                window.innerHeight
            );
        }
    );


</script>


</body>
</html>
